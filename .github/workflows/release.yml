name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p geekzip-gpui -p geekzip-cli

      - name: Package
        run: |
          mkdir -p dist/GeekZip.app/Contents/MacOS dist/GeekZip.app/Contents/Resources
          cp target/release/geekzip-gpui dist/GeekZip.app/Contents/MacOS/GeekZip
          cp crates/geekzip-gpui/assets/icons/GeekZip.icns dist/GeekZip.app/Contents/Resources/GeekZip.icns
          cp target/release/geekzip dist/geekzip-cli
          cat > dist/GeekZip.app/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>GeekZip</string>
            <key>CFBundleIdentifier</key><string>com.openspring.geekzip</string>
            <key>CFBundleName</key><string>GeekZip</string>
            <key>CFBundleDisplayName</key><string>GeekZip</string>
            <key>CFBundleIconFile</key><string>GeekZip</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - dist/GeekZip.app
          ditto -c -k --sequesterRsrc --keepParent dist/GeekZip.app dist/GeekZip-macos-arm64.app.zip
          tar -C dist -czf dist/geekzip-cli-macos-arm64.tar.gz geekzip-cli
          cd dist && shasum -a 256 GeekZip-macos-arm64.app.zip geekzip-cli-macos-arm64.tar.gz > SHA256SUMS-macos-arm64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GeekZip-macos-arm64.app.zip
            dist/geekzip-cli-macos-arm64.tar.gz
            dist/SHA256SUMS-macos-arm64
          generate_release_notes: true

  windows-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        shell: pwsh
        run: cargo build --release -p geekzip-gpui -p geekzip-cli

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/GeekZip | Out-Null
          Copy-Item target/release/geekzip-gpui.exe dist/GeekZip/GeekZip.exe
          Copy-Item target/release/geekzip.exe dist/GeekZip/geekzip.exe
          Copy-Item crates/geekzip-gpui/assets/icons/gz-icon-dark.png dist/GeekZip/GeekZip.png
          @"
          GeekZip ${env:GITHUB_REF_NAME}

          Run GeekZip.exe for the native desktop UI.
          Run geekzip.exe --help for the command-line tool.
          "@ | Set-Content -Encoding UTF8 dist/GeekZip/README.txt
          Compress-Archive -Path dist/GeekZip -DestinationPath dist/GeekZip-windows-x64.zip -Force
          Compress-Archive -Path dist/GeekZip/geekzip.exe -DestinationPath dist/geekzip-cli-windows-x64.zip -Force
          Get-FileHash dist/GeekZip-windows-x64.zip, dist/geekzip-cli-windows-x64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII dist/SHA256SUMS-windows-x64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GeekZip-windows-x64.zip
            dist/geekzip-cli-windows-x64.zip
            dist/SHA256SUMS-windows-x64
          generate_release_notes: true
