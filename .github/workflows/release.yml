name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action/setup@v1

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install create-dmg
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install wixtoolset

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd geekzip-frontend
          npm install

      - name: Build frontend
        run: |
          cd geekzip-frontend
          npm run build

      - name: Update dist symlink
        run: |
          rm -f dist
          ln -sf geekzip-frontend/dist dist

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install tauri-cli
        run: cargo binstall tauri-cli --version "^2" -y

      - name: Build Tauri app (macOS ARM64)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin'
        run: cargo tauri build ${{ matrix.args }}

      - name: Build Tauri app (macOS x86_64)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        run: cargo tauri build ${{ matrix.args }}

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload artifacts (macOS ARM64)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: GeekZip-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/GeekZip.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artifacts (macOS x86_64)
        if: matrix.platform == 'macos-latest' && matrix.args == '--target x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: GeekZip-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/GeekZip.app
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GeekZip-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.app/**
          draft: true
          generate_release_notes: true