name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release -p geekzip-gpui -p geekzip-cli

      - name: Package
        run: |
          mkdir -p dist/GeekZip.app/Contents/MacOS
          cp target/release/geekzip-gpui dist/GeekZip.app/Contents/MacOS/GeekZip
          cp target/release/geekzip dist/geekzip-cli
          cat > dist/GeekZip.app/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>GeekZip</string>
            <key>CFBundleIdentifier</key><string>com.openspring.geekzip</string>
            <key>CFBundleName</key><string>GeekZip</string>
            <key>CFBundleDisplayName</key><string>GeekZip</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - dist/GeekZip.app
          ditto -c -k --sequesterRsrc --keepParent dist/GeekZip.app dist/GeekZip-macos-arm64.app.zip
          tar -C dist -czf dist/geekzip-cli-macos-arm64.tar.gz geekzip-cli
          cd dist && shasum -a 256 GeekZip-macos-arm64.app.zip geekzip-cli-macos-arm64.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GeekZip-macos-arm64.app.zip
            dist/geekzip-cli-macos-arm64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
